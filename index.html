<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMX Quantum Mining</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #131b2e;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h2 { font-size: 20px; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        .btn {
            background-color: #1d4ed8;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:disabled {
            background-color: #334155;
            cursor: not-allowed;
        }
        .status-msg {
            margin-top: 12px;
            font-size: 13px;
            color: #f87171; /* Soft red for errors/warnings */
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>TMX Quantum Mining</h2>
        <p>Watch a rewarded ad to mine and claim your TMX tokens securely!</p>
        
        <!-- Interactive Claim Button -->
        <button id="claim-btn" class="btn">Watch Ad & Claim TMX</button>
        
        <!-- Dynamic Status/Error Message Container -->
        <div id="status-msg" class="status-msg"></div>
    </div>

    <!-- Include your script handler -->
    <script src="app.js"></script>
</body>
</html>
